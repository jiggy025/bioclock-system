# Hibernate general logging: only show errors
log4j.logger.org.hibernate=ERROR

# Show SQL statements generated by Hibernate
log4j.logger.org.hibernate.SQL=DEBUG

# Optional: show parameter values bound to queries
log4j.logger.org.hibernate.type=TRACE

# Root logger: send everything to file
log4j.rootLogger=ERROR, file

# File appender
log4j.appender.file=org.apache.log4j.FileAppender
log4j.appender.file.File=hibernate.log
log4j.appender.file.Append=true
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c - %m%n
